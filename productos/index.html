<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo de Productos | Santo Padel Bolivia</title>
  <meta name="description" content="Catálogo completo de padel: paletas, calzado, indumentaria y accesorios de las mejores marcas. Consultá disponibilidad por WhatsApp.">
  <meta name="robots" content="index, follow">
  <link rel="icon" type="image/svg+xml" href="../assets/img/logo.svg">
  <link rel="manifest" href="../manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/catalog.css">
</head>
<body>

<div id="navbar-root"></div>

<main class="catalog-page">
  <nav class="breadcrumb" aria-label="Breadcrumb">
    <a href="../">Inicio</a>
    <span>/</span>
    <span>Productos</span>
  </nav>

  <div class="section-header">
    <div>
      <div class="section-tag">// Tienda</div>
      <h1 class="section-title">CATÁLOGO</h1>
    </div>
    <span class="catalog-count" id="products-count"></span>
  </div>

  <div class="filter-bar">
    <button class="filter-tab active" data-category="todos">Todos</button>
    <button class="filter-tab" data-category="paletas">Paletas</button>
    <button class="filter-tab" data-category="calzado">Calzado</button>
    <button class="filter-tab" data-category="indumentaria">Indumentaria</button>
    <button class="filter-tab" data-category="accesorios">Accesorios</button>
  </div>

  <div class="catalog-grid" id="products-grid"></div>
</main>

<div id="footer-root"></div>
<div id="wa-root"></div>

<script type="module">
  import { initComponents } from "../assets/js/components.js";
  import { initCatalog } from "../assets/js/products.js";

  initComponents("productos");
  initCatalog();
</script>
</body>
</html>
