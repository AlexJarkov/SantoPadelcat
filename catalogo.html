<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Inicio | Santo Padel</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        html, body {
            height: 100%;
            width: 100%;
        }

        body.home-hub {
            padding: 0;
            margin: 0;
            min-height: 100vh;
            height: 100vh;
            width: 100%;
            max-width: 100%;
            background: var(--ink);
            color: var(--surface-strong);
            display: grid;
            place-items: center;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
        }

        .home-launcher {
            width: min(640px, 96vw);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: clamp(20px, 6vh, 36px);
            text-align: center;
            padding: clamp(16px, 4vw, 32px);
            box-sizing: border-box;
        }

        .home-logo {
            width: clamp(220px, 40vw, 340px);
            height: auto;
            object-fit: contain;
            transition: width 0.3s ease;
            border-radius: 24px;
            box-shadow: 0 20px 42px rgba(0, 0, 0, 0.35);
        }

        .home-actions {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: clamp(10px, 1.8vw, 16px);
        }

        .home-action {
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: clamp(90px, 14vh, 140px);
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 600;
            font-size: 0.66rem;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease, border-color 0.2s ease;
        }

        .home-action:focus-visible {
            outline: none;
            box-shadow: 0 0 0 2px rgba(177, 229, 1, 0.7);
        }

        .home-action:hover {
            transform: translateY(-3px);
            background: rgba(177, 229, 1, 0.16);
            border-color: rgba(177, 229, 1, 0.8);
            box-shadow: 0 16px 28px rgba(0, 0, 0, 0.28);
        }

        .home-action__icon {
            width: 30px;
            height: 30px;
            color: var(--accent);
        }

        .home-action__icon svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        @media (max-width: 560px) {
            .home-actions {
                grid-template-columns: 1fr;
            }

            .home-action {
                min-height: 76px;
            }
        }
    </style>
</head>

<body class="home-hub">
    <main class="home-launcher" aria-label="Accesos principales">
        <img src="imagenes/santo-padel-logo-placeholder.png" alt="Santo Padel" class="home-logo">
        <div class="home-actions">
            <a class="home-action" href="palas.html" data-shell-target="palas.html">
                <span class="home-action__icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                        <ellipse cx="12" cy="9" rx="4.5" ry="6"></ellipse>
                        <path d="M10 14.5 6 20"></path>
                        <path d="M6 20h5"></path>
                    </svg>
                </span>
                <span>Palas</span>
            </a>
            <a class="home-action" href="vestimentas.html" data-shell-target="vestimentas.html">
                <span class="home-action__icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M8 5h8l2 3-2.5 2-1.5-2v11H9.5V8L8 10 5.5 8z"></path>
                    </svg>
                </span>
                <span>Vestimentas</span>
            </a>
            <a class="home-action" href="accesorios.html" data-shell-target="accesorios.html">
                <span class="home-action__icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="8" cy="12" r="3"></circle>
                        <circle cx="16" cy="12" r="3"></circle>
                        <path d="M11 12h2"></path>
                    </svg>
                </span>
                <span>Accesorios</span>
            </a>
        </div>
    </main>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const actions = document.querySelectorAll('.home-action[data-shell-target]');
            actions.forEach(action => {
                action.addEventListener('click', (event) => {
                    const target = action.dataset.shellTarget;
                    if (!target) {
                        return;
                    }
                    const parentNav = window.parent && window.parent !== window && window.parent.catalogShellNavigate;
                    if (typeof parentNav === 'function') {
                        const handled = parentNav(target);
                        if (handled) {
                            event.preventDefault();
                        }
                    }
                });
            });
        });
    </script>
    <script src="js/scripts.js"></script>
</body>

</html>
