<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página no encontrada | Santo Padel</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="assets/img/logo.svg">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/global.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .error-number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(8rem, 20vw, 16rem);
      line-height: 1;
      color: rgba(177,229,1,0.06);
      letter-spacing: 10px;
      margin-bottom: -2rem;
    }
    .error-page h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      margin-bottom: 1rem;
      position: relative;
    }
    .error-page h1 .accent { color: var(--primary); }
    .error-page p {
      color: var(--text-muted);
      font-size: 1rem;
      margin-bottom: 2.5rem;
      max-width: 400px;
    }
    .error-actions { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
  </style>
</head>
<body>

<div id="navbar-root"></div>

<main class="error-page">
  <div class="error-number">404</div>
  <h1>PÁGINA <span class="accent">NO</span> ENCONTRADA</h1>
  <p>La página que buscás no existe o fue movida. Explorá el catálogo o volvé al inicio.</p>
  <div class="error-actions">
    <a href="/" class="btn-primary">IR AL INICIO</a>
    <a href="/productos/" class="btn-outline">VER CATÁLOGO</a>
  </div>
</main>

<div id="footer-root"></div>
<div id="wa-root"></div>

<script type="module">
  import { initComponents } from "./assets/js/components.js";
  initComponents();
</script>
</body>
</html>
